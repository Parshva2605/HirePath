*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.wrap{padding:1rem 0}
.top{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.top input{flex:1;min-width:180px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px}
.top input:focus{outline:none;box-shadow:0 0 0 2px var(--color-border-info)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:all .15s}
.fbtn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.stats{font-size:13px;color:var(--color-text-secondary);margin-bottom:.75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;max-height:520px;overflow-y:auto;padding-right:4px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.b-paid{background:#EEEDFE;color:#3C3489}
.b-free{background:#EAF3DE;color:#27500A}
.b-yt{background:#FCEBEB;color:#791F1F}
.card-meta{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px}
.card-api{font-size:11px;padding:2px 7px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);display:inline-block}
.detail{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:6px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.detail a{color:var(--color-text-info);text-decoration:none}
.detail a:hover{text-decoration:underline}
.linkrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.linkbtn{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;border:0.5px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);font-size:11px;text-decoration:none;white-space:nowrap}
.linkbtn.secondary{background:var(--color-background-primary);border-color:var(--color-border-tertiary);color:var(--color-text-primary)}
.linkbtn:hover{text-decoration:none}
.hidden{display:none}
</style>

let activeF="all";
function setF(btn){
  activeF=btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function typeLabel(s){
  if(s.type==="paid") return {label:"Paid + Cert",cls:"b-paid"};
  if(s.type==="free"&&s.cert) return {label:"Free + Cert",cls:"b-free"};
  return {label:"YouTube / Free",cls:"b-yt"};
}
function buildYoutubeQuery(skill, variant){
  const terms=[skill.t,skill.cat,"free course"];
  terms.push(variant==="playlist" ? "playlist" : "tutorial");
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(terms.join(" "))}`;
}
function buildResourceLinks(skill){
  const videoUrl=buildYoutubeQuery(skill,"video");
  const playlistUrl=buildYoutubeQuery(skill,"playlist");
  const originalUrl=skill.url ? skill.url : "";
  return `
      <div class="linkrow">
        <a class="linkbtn" href="${videoUrl}" target="_blank" rel="noopener noreferrer">YouTube video</a>
        <a class="linkbtn" href="${playlistUrl}" target="_blank" rel="noopener noreferrer">YouTube playlist</a>
        ${originalUrl ? `<a class="linkbtn secondary" href="${originalUrl}" target="_blank" rel="noopener noreferrer">Original resource</a>` : ""}
      </div>`;
}
function matches(s){
  const q=document.getElementById('q').value.toLowerCase();
  if(q&&!s.t.toLowerCase().includes(q)&&!s.cat.toLowerCase().includes(q)&&!s.api.toLowerCase().includes(q)) return false;
  if(activeF==="paid") return s.type==="paid";
  if(activeF==="free") return s.type==="free"&&s.cert;
  if(activeF==="yt") return true;
  return true;
}
function render(){
  const filtered=SKILLS.filter(matches);
  document.getElementById('stats').textContent=`Showing ${filtered.length} of ${SKILLS.length} skills`;
  const g=document.getElementById('grid');
  g.innerHTML=filtered.map((s,i)=>{
    const lb=typeLabel(s);
    return `<div class="card" onclick="toggle(${SKILLS.indexOf(s)})">
      <div class="card-head">
        <div class="card-title">${s.t}</div>
        <span class="badge ${lb.cls}">${lb.label}</span>
      </div>
      <div class="card-meta">${s.cat} &middot; ${s.platform}</div>
      <div class="card-api">${s.api}</div>
      <div class="detail hidden" id="d${SKILLS.indexOf(s)}" onclick="event.stopPropagation()">
        <div>Direct YouTube options for this skill:</div>
        ${buildResourceLinks(s)}
      </div>
    </div>`;
  }).join('');
}
function toggle(i){
  const d=document.getElementById('d'+i);
  if(d) d.classList.toggle('hidden');
}
render();
</script>
